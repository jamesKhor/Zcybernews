name: AI Content Pipeline

on:
  schedule:
    # Hourly — cron runs in UTC; pipeline is timezone-agnostic
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      max_articles:
        description: "Max articles to generate"
        required: false
        default: "3"
      dry_run:
        description: "Dry run — fetch feeds but do not generate or write"
        required: false
        type: boolean
        default: false

concurrency:
  group: ai-pipeline
  cancel-in-progress: false

jobs:
  generate:
    name: Generate & Publish Articles
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Run AI Pipeline
        id: pipeline
        env:
          MAX_ARTICLES: ${{ inputs.max_articles || '3' }}
          DRY_RUN: ${{ inputs.dry_run }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          MAX_ARTICLES=$(echo "$MAX_ARTICLES" | grep -oE '^[0-9]+$' || echo 3)
          ARGS="--max-articles=$MAX_ARTICLES"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          set +e
          npx tsx scripts/pipeline/index.ts $ARGS
          PIPELINE_EXIT=$?
          set -e
          echo "pipeline_exit=$PIPELINE_EXIT" >> "$GITHUB_OUTPUT"
          if [ "$PIPELINE_EXIT" -ne 0 ]; then
            echo "::warning::Pipeline exited with code $PIPELINE_EXIT (partial failures possible; still committing whatever succeeded)"
          fi

      - name: Detect new content
        id: detect
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          NEW_FILES=$(git status --short content/ public/images/articles/ .pipeline-cache/ 2>/dev/null | wc -l | tr -d ' ')
          echo "new_files=$NEW_FILES" >> "$GITHUB_OUTPUT"
          echo "📂 $NEW_FILES new or modified file(s)"

      - name: Collect article titles
        id: titles
        if: ${{ inputs.dry_run != 'true' && steps.detect.outputs.new_files != '0' }}
        run: |
          TITLES=$(git status --short content/en/ 2>/dev/null \
            | awk '/\.mdx$/ {print $2}' \
            | head -5 \
            | xargs -I{} basename {} .mdx 2>/dev/null \
            | sed 's/-/ /g' \
            | sed 's/^/• /' || echo "")
          {
            echo 'titles<<EOF'
            echo "$TITLES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          COUNT=$(echo "$TITLES" | grep -c '^•' || echo 0)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Commit generated content
        if: ${{ inputs.dry_run != 'true' && steps.detect.outputs.new_files != '0' }}
        run: |
          git config user.name "zcybernews-bot"
          git config user.email "bot@zcybernews.com"
          git add content/ public/images/articles/ .pipeline-cache/ data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: ai pipeline $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Rebase in case deploy-vps or human commits landed mid-run
          git pull --rebase origin main || git reset --hard origin/main
          git push origin main

      - name: Notify Telegram — success
        if: ${{ success() && inputs.dry_run != 'true' && steps.detect.outputs.new_files != '0' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COUNT: ${{ steps.titles.outputs.count }}
          TITLES: ${{ steps.titles.outputs.titles }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::notice::Telegram secrets not configured — skipping notification"
            exit 0
          fi
          TIME=$(TZ='Asia/Singapore' date '+%H:%M SGT')
          MESSAGE="✅ <b>ZCyberNews Published ${COUNT} article(s)</b>%0ATime: ${TIME}%0A%0A${TITLES//$'\n'/%0A}%0A%0A🔗 https://zcybernews.com"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode parse_mode="HTML" \
            --data-urlencode disable_web_page_preview="true" \
            --data-urlencode text="$(echo -e "$MESSAGE" | tr '_' ' ')" \
            > /dev/null || true

      - name: Notify Telegram — no new articles
        if: ${{ success() && inputs.dry_run != 'true' && steps.detect.outputs.new_files == '0' }}
        run: |
          echo "::notice::No new articles this run (all stories already processed) — no notification sent."

      - name: Notify Telegram — failure
        if: ${{ failure() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode parse_mode="HTML" \
            --data-urlencode disable_web_page_preview="true" \
            --data-urlencode text="❌ <b>ZCyberNews Pipeline failed</b>%0A%0ARun: ${RUN_URL}" \
            > /dev/null || true
